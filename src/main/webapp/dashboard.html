<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard — Password Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="dashboard.html">
                <i class="bi bi-shield-lock me-2"></i>Password Manager
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small">
                    Hola, <span id="navbar-username" class="text-white fw-semibold"></span>
                </span>
                <button id="btn-logout" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-3 mb-4" id="stats-row">
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm text-center py-3">
                    <div class="fs-2 fw-bold text-primary" id="stat-total">—</div>
                    <div class="text-muted small">Total</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm text-center py-3">
                    <div class="fs-2 fw-bold text-success" id="stat-categories">—</div>
                    <div class="text-muted small">Categorías</div>
                </div>
            </div>
        </div>

        <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal-password">
                <i class="bi bi-plus-lg me-1"></i>Nueva credencial
            </button>
            <input type="search" id="search-input" class="form-control w-auto flex-grow-1" placeholder="Buscar por sitio...">
            <select id="filter-category" class="form-select w-auto">
                <option value="">Todas las categorías</option>
            </select>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Sitio</th>
                                <th class="d-none d-md-table-cell">Usuario</th>
                                <th class="d-none d-md-table-cell">Categoría</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="passwords-tbody">
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: crear/editar -->
    <div class="modal fade" id="modal-password" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">Nueva credencial</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modal-alert" class="alert d-none" role="alert"></div>
                    <form id="password-form">
                        <input type="hidden" id="edit-id">
                        <div class="mb-3">
                            <label class="form-label">Nombre del sitio<span class="text-danger">*</span></label>
                            <input type="text" id="field-siteName" class="form-control" placeholder="GitHub" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL</label>
                            <input type="url" id="field-siteUrl" class="form-control" placeholder="https://github.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Usuario/Email</label>
                            <input type="text" id="field-username" class="form-control" placeholder="mi@email.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña<span class="text-danger">*</span></label>
                            <input type="password" id="field-password" class="form-control password-field" placeholder="••••••••">
                            <div class="form-text">Déjala vacía al editar para no cambiarla.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" id="field-category" class="form-control" placeholder="General">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notas</label>
                            <textarea id="field-notes" class="form-control" rows="2" placeholder="Opcional..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" id="btn-save">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: revelar contraseña -->
    <div class="modal fade" id="modal-reveal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Contraseña</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <p class="password-field fs-5 mb-2 user-select-all" id="revealed-password">...</p>
                    <small class="text-muted">Haz clic para copiarla</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.guard.js"></script>
    <script>
        let allPasswords = [];
        const modalPassword = new bootstrap.Modal('#modal-password');
        const modalReveal = new bootstrap.Modal('#modal-reveal');

        (async () => {
            await requireAuth();
            await loadPasswords();
        })();

        document.getElementById('btn-logout').addEventListener('click', () => {
            API.logout();
            window.location.href = 'login.html';
        });

        async function loadPasswords() {
            try {
                const { data } = await API.getAll();
                allPasswords = data;
                renderTable(data);
                renderStats(data);
                renderCategories(data);
            } catch {
                showTableMsg('Error al cargar credenciales.');
            }
        }

        function renderTable(list) {
            const tbody = document.getElementById('passwords-tbody');
            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">Sin credenciales guardadas.</td></tr>`;
                return;
            }
            tbody.innerHTML = list.map(p => `
                <tr class="fade-in">
                    <td>
                        <div class="fw-semibold">${esc(p.siteName)}</div>
                        ${p.siteUrl ? `<a href="${esc(p.siteUrl)}" target="_blank" class="text-muted small">${esc(p.siteUrl)}</a>` : ''}
                    </td>
                    <td class="d-none d-md-table-cell text-muted small">${esc(p.username || '—')}</td>
                    <td class="d-none d-md-table-cell">
                        <span class="badge bg-secondary">${esc(p.category || 'General')}</span>
                    </td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-secondary me-1" onclick="revealPassword(${p.id})" title="Ver contraseña">
                            <i class="bi bi-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="openEdit(${p.id})" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deletePassword(${p.id})" title="Eliminar">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function renderStats(list) {
            document.getElementById('stat-total').textContent = list.length;
            const cats = new Set(list.map(p => p.category || 'General'));
            document.getElementById('stat-categories').textContent = cats.size;
        }

        function renderCategories(list) {
            const cats = [...new Set(list.map(p => p.category || 'General'))].sort();
            const select = document.getElementById('filter-category');
            const prev = select.value;
            select.innerHTML = '<option value="">Todas las categorías</option>' +
                cats.map(c => `<option value="${esc(c)}"${c === prev ? 'selected' : ''}>${esc(c)}</option>`).join('');
        }

        const applyFilters = () => {
            const search = document.getElementById('search-input').value.toLowerCase();
            const category = document.getElementById('filter-category').value;
            const filtered = allPasswords.filter(p => {
                const matchSearch = !search || p.siteName.toLowerCase().includes(search);
                const matchCategory = !category || (p.category || 'General') === category;
                return matchSearch && matchCategory;
            });
            renderTable(filtered);
        };

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('filter-category').addEventListener('change', applyFilters);

        // ✅ CORREGIDO: revealPassword con fetch directo al backend
        async function revealPassword(id) {
            try {
                // ✅ Obtener credenciales directamente de sessionStorage
                const creds = JSON.parse(sessionStorage.getItem('pm_credentials') || '{}');
                const auth = btoa((creds.email || '') + ':' + (creds.password || ''));
                
                // ✅ Fetch directo al backend (sin pasar por api.js)
                const res = await fetch('/api/passwords/' + id + '/reveal', {
                    headers: { 
                        'Authorization': 'Basic ' + auth,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || 'Error al revelar');
                }
                
                const json = await res.json();
                
                // ✅ Manejar ambas estructuras posibles
                const password = json.password || (json.data && json.data.password) || 'No disponible';
                
                document.getElementById('revealed-password').textContent = password;
                
                // ✅ Mostrar modal
                const modalReveal = new bootstrap.Modal(document.getElementById('modal-reveal'));
                modalReveal.show();
                
            } catch (err) {
                console.error('❌ revealPassword error:', err);
                alert('Error: ' + err.message);
            }
        }

        document.getElementById('revealed-password').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('revealed-password').textContent);
        });

        document.querySelector('[data-bs-target="#modal-password"]').addEventListener('click', () => {
            document.getElementById('modal-title').textContent = 'Nueva credencial';
            document.getElementById('password-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('field-password').required = true;
            document.getElementById('modal-alert').className = 'alert d-none';
        });

        async function openEdit(id) {
            try {
                const { data } = await API.getOne(id);
                document.getElementById('modal-title').textContent = 'Editar credencial';
                document.getElementById('edit-id').value = data.id;
                document.getElementById('field-siteName').value = data.siteName || '';
                document.getElementById('field-siteUrl').value = data.siteUrl || '';
                document.getElementById('field-username').value = data.username || '';
                document.getElementById('field-password').value = '';
                document.getElementById('field-category').value = data.category || '';
                document.getElementById('field-notes').value = data.notes || '';
                document.getElementById('field-password').required = false;
                document.getElementById('modal-alert').className = 'alert d-none';
                modalPassword.show();
            } catch (err) {
                alert(err.message);
            }
        }

        document.getElementById('btn-save').addEventListener('click', async () => {
            const id = document.getElementById('edit-id').value;
            const password = document.getElementById('field-password').value;
            const body = {
                siteName: document.getElementById('field-siteName').value.trim(),
                siteUrl: document.getElementById('field-siteUrl').value.trim(),
                username: document.getElementById('field-username').value.trim(),
                category: document.getElementById('field-category').value.trim() || 'General',
                notes: document.getElementById('field-notes').value.trim()
            };
            if (password) body.password = password;

            if (!body.siteName || (!id && !password)) {
                showModalAlert('Sitio y contraseña son obligatorios.');
                return;
            }

            try {
                id ? await API.update(id, body) : await API.create(body);
                modalPassword.hide();
                await loadPasswords();
            } catch (err) {
                showModalAlert(err.message);
            }
        });

        async function deletePassword(id) {
            if (!confirm('¿Eliminar esta credencial? Esta acción no se puede deshacer.')) return;
            try {
                await API.remove(id);
                await loadPasswords();
            } catch (err) {
                alert(err.message);
            }
        }

        const esc = (str) => String(str ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');

        const showModalAlert = (msg) => {
            const el = document.getElementById('modal-alert');
            el.textContent = msg;
            el.className = 'alert alert-danger fade-in';
        };

        const showTableMsg = (msg) => {
            document.getElementById('passwords-tbody').innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">${msg}</td></tr>`;
        };
    </script>
</body>
</html>
