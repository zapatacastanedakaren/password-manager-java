<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard — Password Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 600; }
        .card-stat { transition: transform 0.2s; }
        .card-stat:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-shield-lock me-2"></i>Password Manager
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small">
                    Hola, <span id="navbar-username" class="text-white fw-semibold">—</span>
                </span>
                <button id="btn-logout" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card card-stat border-0 shadow-sm text-center py-3">
                    <div class="fs-2 fw-bold text-primary" id="stat-total">0</div>
                    <div class="text-muted small">Total</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card card-stat border-0 shadow-sm text-center py-3">
                    <div class="fs-2 fw-bold text-success" id="stat-categories">0</div>
                    <div class="text-muted small">Categorías</div>
                </div>
            </div>
        </div>

        <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal-credential">
                <i class="bi bi-plus-lg me-1"></i>Nueva credencial
            </button>
            <input type="search" id="search-input" class="form-control w-auto flex-grow-1" placeholder="Buscar por sitio...">
            <select id="filter-category" class="form-select w-auto">
                <option value="">Todas las categorías</option>
            </select>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Sitio</th>
                                <th class="d-none d-md-table-cell">Usuario</th>
                                <th class="d-none d-md-table-cell">Categoría</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="passwords-tbody">
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">
                                    <span class="spinner-border spinner-border-sm me-2"></span>
                                    Cargando...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Crear/Editar -->
    <div class="modal fade" id="modal-credential" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">Nueva credencial</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modal-alert" class="alert d-none" role="alert"></div>
                    <form id="credential-form">
                        <input type="hidden" id="edit-id">
                        <div class="mb-3">
                            <label class="form-label">Nombre del sitio <span class="text-danger">*</span></label>
                            <input type="text" id="field-siteName" class="form-control" placeholder="GitHub" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL</label>
                            <input type="url" id="field-siteUrl" class="form-control" placeholder="https://github.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Usuario/Email</label>
                            <input type="text" id="field-username" class="form-control" placeholder="mi@email.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña <span class="text-danger">*</span></label>
                            <input type="password" id="field-password" class="form-control" placeholder="••••••••" required>
                            <div class="form-text">Déjala vacía al editar para no cambiarla.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" id="field-category" class="form-control" placeholder="General">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notas</label>
                            <textarea id="field-notes" class="form-control" rows="2" placeholder="Opcional..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" id="btn-save">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Revelar -->
    <div class="modal fade" id="modal-reveal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Contraseña</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <p class="fs-5 mb-2 user-select-all" id="revealed-password">...</p>
                    <small class="text-muted">Haz clic para copiarla</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts GLOBALES (sin type="module") -->
    <script src="js/api.js"></script>
    <script>
        var allPasswords = [];
        var modal = new bootstrap.Modal(document.getElementById('modal-credential'));
        var modalReveal = new bootstrap.Modal(document.getElementById('modal-reveal'));

        (async function() {
            const user = await requireAuth();
            if (user) {
                loadPasswords();
            }
        })();

        async function loadPasswords() {
            try {
                const response = await API.getAll();
                allPasswords = response.data || [];
                renderTable(allPasswords);
                renderStats(allPasswords);
                renderCategories(allPasswords);
            } catch (err) {
                console.error('Error al cargar:', err);
                document.getElementById('passwords-tbody').innerHTML = 
                    '<tr><td colspan="4" class="text-center text-danger py-4">Error al cargar credenciales</td></tr>';
            }
        }

        function renderTable(list) {
            var tbody = document.getElementById('passwords-tbody');
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Sin credenciales guardadas.</td></tr>';
                return;
            }
            
            var html = '';
            list.forEach(function(p) {
                html += '<tr>' +
                    '<td>' +
                        '<div class="fw-semibold">' + escapeHtml(p.siteName) + '</div>' +
                        (p.siteUrl ? '<a href="' + escapeHtml(p.siteUrl) + '" target="_blank" class="text-muted small">' + escapeHtml(p.siteUrl) + '</a>' : '') +
                    '</td>' +
                    '<td class="d-none d-md-table-cell text-muted small">' + escapeHtml(p.username || '—') + '</td>' +
                    '<td class="d-none d-md-table-cell"><span class="badge bg-secondary">' + escapeHtml(p.category || 'General') + '</span></td>' +
                    '<td class="text-end">' +
                        '<button class="btn btn-sm btn-outline-secondary me-1 btn-reveal" data-id="' + p.id + '" title="Ver contraseña"><i class="bi bi-eye"></i></button>' +
                        '<button class="btn btn-sm btn-outline-primary me-1 btn-edit" data-id="' + p.id + '" title="Editar"><i class="bi bi-pencil"></i></button>' +
                        '<button class="btn btn-sm btn-outline-danger btn-delete" data-id="' + p.id + '" title="Eliminar"><i class="bi bi-trash"></i></button>' +
                    '</td>' +
                '</tr>';
            });
            tbody.innerHTML = html;

            // Agregar event listeners
            document.querySelectorAll('.btn-reveal').forEach(function(btn) {
                btn.addEventListener('click', function() { revealPassword(btn.dataset.id); });
            });
            document.querySelectorAll('.btn-edit').forEach(function(btn) {
                btn.addEventListener('click', function() { openEdit(btn.dataset.id); });
            });
            document.querySelectorAll('.btn-delete').forEach(function(btn) {
                btn.addEventListener('click', function() { deletePassword(btn.dataset.id); });
            });
        }

        function renderStats(list) {
            document.getElementById('stat-total').textContent = list.length;
            var cats = new Set();
            list.forEach(function(p) { cats.add(p.category || 'General'); });
            document.getElementById('stat-categories').textContent = cats.size;
        }

        function renderCategories(list) {
            var cats = [];
            list.forEach(function(p) { cats.push(p.category || 'General'); });
            cats = [...new Set(cats)].sort();
            var select = document.getElementById('filter-category');
            var html = '<option value="">Todas las categorías</option>';
            cats.forEach(function(c) {
                html += '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>';
            });
            select.innerHTML = html;
        }

        async function revealPassword(id) {
            try {
                const result = await API.reveal(id);
                document.getElementById('revealed-password').textContent = result.password;
                modalReveal.show();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function openEdit(id) {
            try {
                const response = await API.getOne(id);
                const data = response.data || response;
                document.getElementById('modal-title').textContent = 'Editar credencial';
                document.getElementById('edit-id').value = data.id;
                document.getElementById('field-siteName').value = data.siteName || '';
                document.getElementById('field-siteUrl').value = data.siteUrl || '';
                document.getElementById('field-username').value = data.username || '';
                document.getElementById('field-password').value = '';
                document.getElementById('field-category').value = data.category || '';
                document.getElementById('field-notes').value = data.notes || '';
                document.getElementById('field-password').required = false;
                modal.show();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        document.getElementById('btn-save').addEventListener('click', async function() {
            var id = document.getElementById('edit-id').value;
            var password = document.getElementById('field-password').value;
            var body = {
                siteName: document.getElementById('field-siteName').value.trim(),
                siteUrl: document.getElementById('field-siteUrl').value.trim(),
                username: document.getElementById('field-username').value.trim(),
                category: document.getElementById('field-category').value.trim() || 'General',
                notes: document.getElementById('field-notes').value.trim()
            };
            if (password) body.password = password;

            if (!body.siteName || (!id && !password)) {
                showAlert('Sitio y contraseña son obligatorios.', 'danger');
                return;
            }

            try {
                if (id) {
                    await API.update(id, body);
                } else {
                    await API.create(body);
                }
                modal.hide();
                loadPasswords();
            } catch (err) {
                showAlert(err.message, 'danger');
            }
        });

        async function deletePassword(id) {
            if (!confirm('¿Eliminar esta credencial? Esta acción no se puede deshacer.')) return;
            try {
                await API.remove(id);
                loadPasswords();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        document.getElementById('btn-logout').addEventListener('click', function() {
            API.logout();
            window.location.href = 'login.html';
        });

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('filter-category').addEventListener('change', applyFilters);

        function applyFilters() {
            var search = document.getElementById('search-input').value.toLowerCase();
            var category = document.getElementById('filter-category').value;
            var filtered = allPasswords.filter(function(p) {
                var matchSearch = !search || p.siteName.toLowerCase().includes(search);
                var matchCategory = !category || (p.category || 'General') === category;
                return matchSearch && matchCategory;
            });
            renderTable(filtered);
        }

        function showAlert(msg, type) {
            var el = document.getElementById('modal-alert');
            el.textContent = msg;
            el.className = 'alert alert-' + type;
            el.classList.remove('d-none');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        document.querySelector('[data-bs-toggle="modal"]').addEventListener('click', function() {
            document.getElementById('modal-title').textContent = 'Nueva credencial';
            document.getElementById('credential-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('field-password').required = true;
            document.getElementById('modal-alert').classList.add('d-none');
        });

        document.getElementById('revealed-password').addEventListener('click', function() {
            navigator.clipboard.writeText(document.getElementById('revealed-password').textContent);
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
