<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Password Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 420px;">
        <div class="card login-card border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-3 fw-bold">Password Manager</h3>
                    <p class="text-muted">Inicia sesión para continuar</p>
                </div>

                <div id="login-alert" class="alert d-none" role="alert"></div>

                <form id="login-form">
                    <div class="mb-3">
                        <label for="login-email" class="form-label">
                            <i class="bi bi-envelope me-1"></i>Correo electrónico
                        </label>
                        <input type="email" id="login-email" class="form-control form-control-lg" placeholder="tu@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="login-password" class="form-label">
                            <i class="bi bi-lock me-1"></i>Contraseña
                        </label>
                        <input type="password" id="login-password" class="form-control form-control-lg" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="btn-login" class="btn btn-primary btn-lg w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
                    </button>
                </form>

                <hr class="my-4">
                <p class="text-center mb-0">
                    ¿Sin cuenta? <a href="register.html" class="text-decoration-none"><strong>Regístrate</strong></a>
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts GLOBALES (sin type="module") -->
    <script src="js/api.js"></script>
    <script>
        // Verificar si ya hay sesión activa
        (async function() {
            const allowed = await requireGuest();
            if (!allowed) return;
        })();

        // Manejar login
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const alertEl = document.getElementById('login-alert');
            const btn = document.getElementById('btn-login');
            
            if (!email || !password) {
                showAlert('Email y contraseña son obligatorios.', 'danger');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Iniciando...';
            
            try {
                await API.login(email, password);
                await new Promise(function(resolve) { setTimeout(resolve, 300); });
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error('Login error:', err);
                showAlert(err.message || 'Error al iniciar sesión.', 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión';
            }
        });

        function showAlert(msg, type) {
            const el = document.getElementById('login-alert');
            if (el) {
                el.textContent = msg;
                el.className = 'alert alert-' + type;
                el.classList.remove('d-none');
            }
        }

        document.getElementById('login-email').addEventListener('input', function() {
            document.getElementById('login-alert').classList.add('d-none');
        });
        document.getElementById('login-password').addEventListener('input', function() {
            document.getElementById('login-alert').classList.add('d-none');
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
