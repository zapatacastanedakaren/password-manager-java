<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro — Password Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh">
    <div class="container" style="max-width:460px">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h4 class="card-title mb-1 fw-semibold">Crear cuenta</h4>
                <p class="text-muted small mb-4">Todos los campos son obligatorios</p>
                
                <div id="alert" class="alert d-none" role="alert"></div>
                
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label">Nombre de usuario</label>
                        <input type="text" id="username" class="form-control" placeholder="mi_usuario" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <div class="form-text">Mínimo 8 caracteres, mayúscula, minúscula y número.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirmar contraseña</label>
                        <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="btn-submit" class="btn btn-primary w-100">
                        Registrarme
                    </button>
                </form>
                
                <hr class="my-3">
                <p class="text-center small mb-0">
                    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.guard.js"></script>
    <script>
        requireGuest();
        
        const showAlert = (msg, type='danger') => {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = `alert alert-${type} fade-in`;
        };
        
        document.getElementById('register-form').addEventListener('submit', async(e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = 'Registrando...';
            
            try {
                await API.register({
                 username: document.getElementById('username').value.trim(),
                 email: document.getElementById('email').value.trim(),
                 password: document.getElementById('password').value,
                 confirmPassword: document.getElementById('confirm-password').value
                });
                 window.location.href = 'dashboard.html';
                
                } catch(err) {
                showAlert(err.message);
                btn.disabled = false;
                btn.textContent = 'Registrarme';
            }
        });
    </script>
</body>
</html>
