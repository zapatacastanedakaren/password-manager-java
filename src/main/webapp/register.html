<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro — Password Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container" style="max-width: 460px;">
        <div class="card register-card border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-3 fw-bold">Crear Cuenta</h3>
                    <p class="text-muted">Todos los campos son obligatorios</p>
                </div>

                <div id="register-alert" class="alert d-none" role="alert"></div>

                <form id="register-form">
                    <div class="mb-3">
                        <label for="register-username" class="form-label">Nombre de usuario</label>
                        <input type="text" id="register-username" class="form-control" placeholder="mi_usuario" required>
                    </div>
                    <div class="mb-3">
                        <label for="register-email" class="form-label">Correo electrónico</label>
                        <input type="email" id="register-email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="register-password" class="form-label">Contraseña</label>
                        <input type="password" id="register-password" class="form-control" placeholder="••••••••" required minlength="8">
                        <div class="form-text">Mínimo 8 caracteres</div>
                    </div>
                    <div class="mb-4">
                        <label for="register-confirm" class="form-label">Confirmar contraseña</label>
                        <input type="password" id="register-confirm" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="btn-register" class="btn btn-primary btn-lg w-100 mb-3">
                        <i class="bi bi-person-plus me-2"></i>Registrarme
                    </button>
                </form>

                <hr class="my-4">
                <p class="text-center mb-0">¿Ya tienes cuenta? <a href="login.html" class="text-decoration-none"><strong>Inicia sesión</strong></a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { API } from './js/api.js';
        import { requireGuest } from './js/auth.guard.js';

        (async () => {
            const allowed = await requireGuest();
            if (!allowed) return;
        })();

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm').value;
            const alertEl = document.getElementById('register-alert');
            const btn = document.getElementById('btn-register');
            
            if (!username || !email || !password || !confirmPassword) {
                showAlert('Todos los campos son obligatorios.', 'danger');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('Las contraseñas no coinciden.', 'danger');
                return;
            }
            
            if (password.length < 8) {
                showAlert('La contraseña debe tener al menos 8 caracteres.', 'danger');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registrando...';
            
            try {
                await API.register(username, email, password, confirmPassword);
                showAlert('✅ Cuenta creada. Redirigiendo al login...', 'success');
                await new Promise(resolve => setTimeout(resolve, 1500));
                window.location.href = 'login.html';
            } catch (err) {
                console.error('Register error:', err);
                showAlert(err.message || 'Error al registrar.', 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>Registrarme';
            }
        });

        function showAlert(msg, type) {
            const el = document.getElementById('register-alert');
            if (el) {
                el.textContent = msg;
                el.className = `alert alert-${type}`;
                el.classList.remove('d-none');
            }
        }

        ['register-username', 'register-email', 'register-password', 'register-confirm'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                document.getElementById('register-alert').classList.add('d-none');
            });
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
