# ===========================================
# Configuración CORREGIDA para HikariCP + MySQL
# ===========================================

# Driver de MySQL (¡ESTO FALTABA!)
driverClassName=com.mysql.cj.jdbc.Driver

# URL de conexión
jdbcUrl=jdbc:mysql://localhost:3306/password_manager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Credenciales (XAMPP: contraseña vacía por defecto)
username=root
password=

# Tamaño del pool
maximumPoolSize=10
minimumIdle=2

# Tiempos (en ms)
connectionTimeout=30000
idleTimeout=600000
maxLifetime=1800000

# Nombre visible en logs
poolName=PasswordManagerPool